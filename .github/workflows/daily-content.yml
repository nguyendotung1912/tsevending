name: Daily content pipeline

on:
  schedule:
    # 01:00 UTC = 08:00 Asia/Ho_Chi_Minh
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      articles_per_run:
        description: "Number of articles to generate (1–5)"
        default: "3"
        required: false

permissions:
  contents: write

jobs:
  generate-articles:
    name: Generate articles (Gemini)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate articles with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-1.5-flash-latest' }}
          ARTICLES_PER_RUN: ${{ inputs.articles_per_run || '3' }}
        run: npm run generate:article:gemini


      - name: Commit new content
        run: |
          git config user.name "tse-content-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/content/blog scripts/content-calendar.json public/images/articles
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            COUNT=$(git diff --cached --name-only | grep '\.md$' | wc -l)
            git commit -m "content: add ${COUNT} SEO article(s) — $(date -u +%Y-%m-%d)"
            git push
          fi

  fetch-world-news:
    name: Fetch & translate world news
    runs-on: ubuntu-latest
    needs: generate-articles
    if: always() && secrets.ANTHROPIC_API_KEY != ''
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch & translate RSS news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run fetch:news

      - name: Commit translated news
        run: |
          git config user.name "tse-content-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main
          git add src/data/world-news.json
          if git diff --cached --quiet; then
            echo "World news unchanged."
          else
            git commit -m "chore: refresh world news — $(date -u +%Y-%m-%d)"
            git push
          fi

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [generate-articles, fetch-world-news]
    if: always()
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel Production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel --prod --yes --token $VERCEL_TOKEN
