<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#065f46"/>
      <stop offset="100%" style="stop-color:#022c22"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1080" cy="80" r="200" fill="#047857" opacity="0.3"/>
  <!-- Formula visual -->
  <rect x="680" y="140" width="460" height="80" rx="12" fill="#ffffff" opacity="0.08"/>
  <text x="910" y="193" font-family="Arial,sans-serif" font-size="26" font-weight="700" fill="#a7f3d0" text-anchor="middle">Nhân viên ÷ 3 = Số ô tủ</text>
  <rect x="680" y="240" width="460" height="80" rx="12" fill="#ffffff" opacity="0.06"/>
  <text x="910" y="293" font-family="Arial,sans-serif" font-size="26" font-weight="700" fill="#6ee7b7" text-anchor="middle">Căn hộ ÷ 3 = Số ô tủ</text>
  <!-- Example calculation -->
  <rect x="680" y="350" width="460" height="130" rx="12" fill="#065f46"/>
  <text x="910" y="384" font-family="Arial,sans-serif" font-size="16" fill="#34d399" text-anchor="middle">VÍ DỤ THỰC TẾ</text>
  <text x="910" y="415" font-family="Arial,sans-serif" font-size="20" fill="#a7f3d0" text-anchor="middle">200 nhân viên hot-desk</text>
  <text x="910" y="445" font-family="Arial,sans-serif" font-size="20" fill="#a7f3d0" text-anchor="middle">→ 200 ÷ 1.5 = 134 ô tủ</text>
  <text x="910" y="472" font-family="Arial,sans-serif" font-size="15" fill="#6ee7b7" text-anchor="middle">30% ngăn S + 50% ngăn M + 20% ngăn L</text>
  <!-- Left content -->
  <text x="115" y="70" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#34d399" letter-spacing="3">HƯỚNG DẪN TÍNH TOÁN</text>
  <text x="115" y="148" font-family="Arial,sans-serif" font-size="50" font-weight="900" fill="#ffffff">Cần bao nhiêu</text>
  <text x="115" y="208" font-family="Arial,sans-serif" font-size="50" font-weight="900" fill="#a7f3d0">ô locker?</text>
  <text x="115" y="280" font-family="Arial,sans-serif" font-size="22" fill="#6ee7b7">Công thức thực tế</text>
  <text x="115" y="310" font-family="Arial,sans-serif" font-size="22" fill="#6ee7b7">cho văn phòng &amp; chung cư</text>
  <!-- Tags -->
  <rect x="115" y="365" width="140" height="35" rx="17" fill="#047857"/>
  <text x="185" y="387" font-family="Arial,sans-serif" font-size="15" fill="#a7f3d0" text-anchor="middle">Văn phòng</text>
  <rect x="270" y="365" width="140" height="35" rx="17" fill="#047857"/>
  <text x="340" y="387" font-family="Arial,sans-serif" font-size="15" fill="#a7f3d0" text-anchor="middle">Chung cư</text>
  <rect x="115" y="415" width="140" height="35" rx="17" fill="#047857"/>
  <text x="185" y="437" font-family="Arial,sans-serif" font-size="15" fill="#a7f3d0" text-anchor="middle">Nhà máy</text>
  <!-- Branding -->
  <rect x="115" y="490" width="260" height="50" rx="25" fill="#34d399"/>
