  <line x1="895" y1="170" x2="895" y2="290" stroke="#92400e" stroke-width="2"/>
  <rect x="980" y="220" width="90" height="90" rx="8" fill="url(#box)" opacity="0.85"/>
  <line x1="980" y1="265" x2="1070" y2="265" stroke="#92400e" stroke-width="2"/>
  <line x1="1025" y1="220" x2="1025" y2="310" stroke="#92400e" stroke-width="2"/>
  <!-- Delivery arrow down to locker -->
  <text x="895" y="340" font-family="Arial,sans-serif" font-size="40" fill="#fde68a" text-anchor="middle">↓</text>
  <!-- Locker panel -->
  <rect x="760" y="380" width="280" height="120" rx="12" fill="#1c1917" stroke="#fbbf24" stroke-width="2"/>
  <rect x="780" y="400" width="50" height="40" rx="4" fill="#fbbf24" opacity="0.7"/>
  <rect x="845" y="400" width="50" height="40" rx="4" fill="#fbbf24" opacity="0.5"/>
  <rect x="910" y="400" width="50" height="40" rx="4" fill="#fbbf24" opacity="0.3"/>
  <rect x="780" y="455" width="50" height="30" rx="4" fill="#fbbf24" opacity="0.4"/>
  <rect x="845" y="455" width="50" height="30" rx="4" fill="#fbbf24" opacity="0.6"/>
  <rect x="910" y="455" width="50" height="30" rx="4" fill="#fbbf24" opacity="0.2"/>
  <text x="1060" y="455" font-family="Arial,sans-serif" font-size="14" fill="#fde68a" text-anchor="start">Smart</text>
  <text x="1060" y="475" font-family="Arial,sans-serif" font-size="14" fill="#fde68a" text-anchor="start">Locker</text>
  <!-- Left content -->
  <text x="115" y="70" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#fbbf24" letter-spacing="3">XU HƯỚNG LOGISTICS</text>
  <text x="115" y="148" font-family="Arial,sans-serif" font-size="50" font-weight="900" fill="#ffffff">Locker Giao</text>
  <text x="115" y="208" font-family="Arial,sans-serif" font-size="50" font-weight="900" fill="#fbbf24">Nhận Hàng</text>
  <text x="115" y="278" font-family="Arial,sans-serif" font-size="22" fill="#fde68a">TMĐT bùng nổ —</text>
  <text x="115" y="308" font-family="Arial,sans-serif" font-size="22" fill="#fde68a">giao hàng không cần chờ</text>
  <!-- Stat -->
  <rect x="115" y="360" width="240" height="80" rx="12" fill="#78350f" opacity="0.8"/>
  <text x="235" y="397" font-family="Arial,sans-serif" font-size="34" font-weight="900" fill="#fbbf24" text-anchor="middle">25%</text>
  <text x="235" y="425" font-family="Arial,sans-serif" font-size="15" fill="#fde68a" text-anchor="middle">Tỷ lệ giao thất bại</text>
  <!-- Branding -->
  <rect x="115" y="490" width="260" height="50" rx="25" fill="#fbbf24"/>
  <text x="245" y="523" font-family="Arial,sans-serif" font-size="20" font-weight="700" fill="#451a03" text-anchor="middle">TSE VENDING</text>
  <text x="115" y="598" font-family="Arial,sans-serif" font-size="16" fill="#fbbf24">tsevending.com</text>
