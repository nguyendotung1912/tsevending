<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e"/>
      <stop offset="100%" style="stop-color:#451a03"/>
    </linearGradient>
    <linearGradient id="box" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1100" cy="100" r="220" fill="#78350f" opacity="0.4"/>
  <!-- Package boxes stacked -->
  <rect x="700" y="200" width="110" height="100" rx="8" fill="url(#box)" opacity="0.9"/>
  <line x1="700" y1="250" x2="810" y2="250" stroke="#92400e" stroke-width="2"/>
  <line x1="755" y1="200" x2="755" y2="300" stroke="#92400e" stroke-width="2"/>
  <rect x="830" y="170" width="130" height="120" rx="8" fill="url(#box)"/>
