<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#020617"/>
  </linearGradient>
  <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#0891b2"/><stop offset="100%" stop-color="#06b6d4"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="sh"><feDropShadow dx="4" dy="7" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/></filter>
</defs>
<rect width="1200" height="630" fill="url(#bg)"/>
<circle cx="1000" cy="-40" r="280" fill="#0c4a6e" opacity="0.15"/>
<circle cx="100" cy="680" r="240" fill="#0f172a" opacity="0.4"/>
<!-- Circuit lines -->
<line x1="700" y1="0" x2="700" y2="630" stroke="#0e7490" stroke-width="0.5" opacity="0.3" stroke-dasharray="4,8"/>
<line x1="0" y1="315" x2="1200" y2="315" stroke="#0e7490" stroke-width="0.5" opacity="0.2" stroke-dasharray="4,12"/>

<!-- Architecture 4-layer diagram (right side) -->
<rect x="750" y="88" width="400" height="440" rx="12" fill="#070e1a" stroke="#0e7490" stroke-width="1" filter="url(#sh)"/>
