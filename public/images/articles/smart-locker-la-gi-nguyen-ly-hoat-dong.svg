<text x="840" y="412" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="#cbd5e1">Phần cứng cơ học</text>
<text x="840" y="429" font-family="Arial,sans-serif" font-size="12" fill="#64748b">Khung thép · Khóa điện từ · Cửa ngăn</text>
<text x="1110" y="412" font-family="Arial,sans-serif" font-size="26" fill="#0e7490" text-anchor="middle">🔩</text>
