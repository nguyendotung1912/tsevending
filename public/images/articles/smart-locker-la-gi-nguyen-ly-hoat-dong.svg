<polygon points="945,361 955,361 950,366" fill="#0e7490" opacity="0.5"/>
<!-- vs label -->
<rect x="762" y="452" width="376" height="62" rx="8" fill="#070e1a"/>
<text x="950" y="476" font-family="Arial,sans-serif" font-size="13" fill="#475569" text-anchor="middle">Khóa cơ thường</text>
<text x="950" y="496" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">vs  Smart Locker = Audit trail đầy đủ + Quản lý từ xa</text>

<!-- TEXT LEFT -->
